directory: /srv/media/library
library: /srv/data/beets/state/library.db
plugins: bandcamp chroma discogs fetchart embedart fromfilename inline duplicates spotify deezer convert beatport4
item_fields:
  source_filename: |
    import os
    from beets.util import bytestring_path
    return bytestring_path(os.path.basename(path))
  source_stem: |
    import os
    from beets.util import bytestring_path
    source_name = os.path.basename(path)
    source_stem, _ = os.path.splitext(source_name)
    return bytestring_path(source_stem)
import:
  write: yes
  copy: no
  move: yes
  link: no
  hardlink: no
  quiet_fallback: asis
  incremental: yes
  incremental_skip_later: no
  singletons: no
  group_albums: yes
  duplicate_action: ask
  timid: yes
match:
  strong_rec_thresh: 0.10
  medium_rec_thresh: 0.30
  distance_weights:
    media: 0.2
    albumdisambig: 0.0
    catalognum: 0.0
    missing_tracks: 0.0
    unmatched_tracks: 0.0
    data_source: 0.1
  max_rec:
    missing_tracks: strong
    unmatched_tracks: strong
fetchart:
  auto: yes
  cautious: yes
  minwidth: 500
  maxwidth: 1200
  cover_names: cover front folder art album
  sources: [filesystem, cover_art_url, coverart, itunes, albumart]
embedart:
  auto: yes
  ifempty: yes
paths:
  default: $albumartist/$album%aunique{}/$source_stem
  comp: Compilations/$album%aunique{}/$source_stem
  singleton: Singles/$artist/$source_stem
duplicates:
  tiebreak:
    items: [bitrate, num_media, tracks]
discogs:
  user_token: REPLACE_WITH_DISCOGS_USER_TOKEN
spotify:
  client_id: REPLACE_WITH_SPOTIFY_CLIENT_ID
  client_secret: REPLACE_WITH_SPOTIFY_CLIENT_SECRET
convert:
  auto: yes
  dest: /srv/media/library
  format: aiff
  copy_album_art: yes
  threads: 2
  quiet: yes
  never_convert_lossy_files: yes
  pretend: no
  delete_originals: yes
  id3v23: true
  formats:
    aiff:
      command: ffmpeg -i $source -y -c:a pcm_s16be -write_id3v2 1 $dest
      extension: aiff
beetcamp:
  include_digital_only_tracks: true
  art: true
chroma:
  auto: yes
beatport4:
  username: REPLACE_WITH_BEATPORT_USERNAME
  password: REPLACE_WITH_BEATPORT_PASSWORD
  art: yes
  art_overwrite: no
