name: ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check flake
        run: nix flake check --no-build

      - name: Build NixOS system
        run: nix build --no-link path:.#nixosConfigurations.dev-vps.config.system.build.toplevel

      - name: Build pinned packages
        run: |
          nix build --no-link path:.#packages.x86_64-linux.codenomad
          nix build --no-link path:.#packages.x86_64-linux.opencode
