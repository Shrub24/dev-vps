name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          ref_slug="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::12}"
          version="$(git describe --tags --dirty --always 2>/dev/null || true)"
          if [[ -z "$version" ]]; then
            version="${ref_slug}+${short_sha}"
          fi
          echo "ref_slug=$ref_slug" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup nixbuild
        uses: ./.github/actions/setup-nixbuild
        with:
          nixbuild_token: ${{ secrets.NIXBUILD_TOKEN }}

      - name: Show build metadata
        run: |
          echo "version=${{ steps.meta.outputs.version }}"
          echo "ref_slug=${{ steps.meta.outputs.ref_slug }}"
          echo "short_sha=${{ steps.meta.outputs.short_sha }}"

      - name: Validate flake wiring
        run: nix flake check --no-build --no-write-lock-file path:.

  build-hosts:
    runs-on: ubuntu-latest
    needs: validate
    environment: ci
    strategy:
      fail-fast: true
      matrix:
        host:
          - do-admin-1
          - oci-melb-1
    env:
      NIXBUILD_STORE: ssh-ng://eu.nixbuild.net
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup nixbuild
        uses: ./.github/actions/setup-nixbuild
        with:
          nixbuild_token: ${{ secrets.NIXBUILD_TOKEN }}

      - name: Remote-build ${{ matrix.host }} toplevel
        run: |
          nix build \
            --no-link \
            --no-write-lock-file \
            --print-build-logs \
            --eval-store auto \
            --store "$NIXBUILD_STORE" \
            path:.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel

      - name: Summarize validation
        run: |
          {
            echo "## CI validation"
            echo "- Host: ${{ matrix.host }}"
            echo "- Build store: $NIXBUILD_STORE"
            echo "- OpenTofu CI: intentionally deferred in this change"
          } >> "$GITHUB_STEP_SUMMARY"
