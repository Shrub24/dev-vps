name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: ci
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive deploy metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          ref_slug="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA::12}"
          version="$(git describe --tags --dirty --always 2>/dev/null || true)"
          if [[ -z "$version" ]]; then
            version="${ref_slug}+${short_sha}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: Setup nixbuild
        uses: ./.github/actions/setup-nixbuild
        with:
          nixbuild_token: ${{ secrets.NIXBUILD_TOKEN }}

      - name: Validate flake wiring
        run: nix flake check --no-build --no-write-lock-file path:.

      - name: Summarize deployment validation
        run: |
          {
            echo "## Deploy validation"
            echo "- Version: ${{ steps.meta.outputs.version }}"
            echo "- SHA: ${{ github.sha }}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Ref: ${{ github.ref }}"
            echo "- Serial deploy order: do-admin-1 -> oci-melb-1"
            echo "- Host prebuilds run inside the reusable deploy-host workflow"
            echo "- Manual workflow_dispatch may deploy from any selected branch ref"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-do-admin-1:
    needs: validate
    uses: ./.github/workflows/deploy-host.yml
    with:
      host: do-admin-1
    secrets: inherit

  deploy-oci-melb-1:
    needs: deploy-do-admin-1
    uses: ./.github/workflows/deploy-host.yml
    with:
      host: oci-melb-1
    secrets: inherit
