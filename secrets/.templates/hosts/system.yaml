# secrets/.templates/hosts/system.yaml – host-scoped bootstrap/system secrets
# Copy this file for each host and replace <host> with the hostname.
# Encrypted to: owner + <host>
# Key path: secrets/hosts/<host>/system.yaml
tailscale:
  auth_key: <value>

recovery:
  # Console-only break-glass password hash for services.hostRecovery.
  # Generate a SHA-512 crypt hash, not a plaintext password.
  # Example: mkpasswd -m sha-512
  rescue_password_hash: <sha512-crypt-hash>

backup:
  # Host-scoped backup credentials for services.state-backups.
  # These map to defaults in modules/services/state-backups.nix:
  # - backup/s3_access_key_id
  # - backup/s3_secret_access_key
  # - backup/restic_password
  s3_access_key_id: <value>
  s3_secret_access_key: <value>
  restic_password: <value>
