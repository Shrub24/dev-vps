keys:
  - &owner_age age1w5asfm5rfncy4yvslj3az78kvn7hkrzq4vy0mzexf36w64a7e3nqamw3fp
  - &oci_melb_1_age age1lg45rhdn6mp856f97sdwxu7rpzyyz7edqwnldnpj67r6curnkqws7nn42a
  - &do_admin_1_age age1a2masnj7tmwjl9azt75kh387lvwwz9vqfhqr0emghdcvu7x9jd9q4wv4aq
creation_rules:
  - path_regex: ^secrets/common\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *oci_melb_1_age
          - *do_admin_1_age
  - path_regex: ^secrets/opentofu/oidc\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *do_admin_1_age
  - path_regex: ^secrets/opentofu/cloudflare\.ya?ml$
    key_groups:
      - age:
          - *owner_age
  - path_regex: ^secrets/opentofu/.*$
    key_groups:
      - age:
          - *owner_age
  # === New topology-aligned secret buckets ===

  # Application scopes
  - path_regex: ^secrets/applications/music\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *oci_melb_1_age
  - path_regex: ^secrets/applications/admin\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *do_admin_1_age
  - path_regex: ^secrets/applications/edge-ingress\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *oci_melb_1_age
          - *do_admin_1_age
  # Service scopes (standalone leaf services)
  - path_regex: ^secrets/services/apprise\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *oci_melb_1_age
          - *do_admin_1_age
  - path_regex: ^secrets/services/niks3\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *oci_melb_1_age
  - path_regex: ^secrets/services/karakeep-pod\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *oci_melb_1_age
  - path_regex: ^secrets/services/bifrost-gateway\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *oci_melb_1_age
  # Identity scopes
  - path_regex: ^secrets/identity/kanidm\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *do_admin_1_age
  - path_regex: ^secrets/identity/provisioning\.json$
    key_groups:
      - age:
          - *owner_age
          - *do_admin_1_age
  # Host exception scopes: system (host/bootstrap-only, including recovery password hashes)
  - path_regex: ^secrets/hosts/oci-melb-1/system\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *oci_melb_1_age
  - path_regex: ^secrets/hosts/do-admin-1/system\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *do_admin_1_age
  # Host exception scopes: OIDC (cross-host identity handshake)
  - path_regex: ^secrets/hosts/oci-melb-1/oidc\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *oci_melb_1_age
          - *do_admin_1_age
  - path_regex: ^secrets/hosts/do-admin-1/oidc\.ya?ml$
    key_groups:
      - age:
          - *owner_age
          - *do_admin_1_age
          - *oci_melb_1_age
  # Firebase service key
  - path_regex: ^secrets/services/firebase-key\.json$
    key_groups:
      - age:
          - *owner_age
          - *do_admin_1_age
